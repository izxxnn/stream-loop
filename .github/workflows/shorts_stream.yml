name: 24/7 Shorts Stream Loop

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Start Shorts Video Loop
      run: |
        # Gofile ka direct stream extract karke loop chalane ke liye
        # Hum gofile ke page se direct download link automatic fetch kar rahe hain
        DIRECT_URL=$(curl -s "https://api.gofile.io/contents/getFolder?folderId=TjCyFH" | grep -oE '"link":"[^"]+"' | head -n 1 | cut -d'"' -f4)
        
        if [ -z "$DIRECT_URL" ]; then
          # Fallback link agar API directly respond na kare
          DIRECT_URL="https://stream.gofile.io/download/web/TjCyFH/video.mp4"
        fi

        ffmpeg -re -stream_loop -1 -i "$DIRECT_URL" -vcodec libx264 -preset veryfast -b:v 2500k -maxrate 2500k -bufsize 5000k -acodec aac -b:a 128k -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.STREAM_KEY }}"
        
