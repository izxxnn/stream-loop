name: 24/7 Shorts Stream Loop

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Start Shorts Video Loop
      run: |
        ffmpeg -re -stream_loop -1 -i "https://litter.catbox.moe/3j4rnq7l9qeiktlp.mp4" \
        -vcodec libx264 -preset veryfast -r 30 -g 60 -b:v 3000k -maxrate 3000k -bufsize 6000k \
        -acodec aac -b:a 128k -ar 44100 -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.STREAM_KEY }}"
        
