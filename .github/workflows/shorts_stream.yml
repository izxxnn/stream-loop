name: Among Us 24/7 Stream

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Download Video from GitHub Release
      run: |
        echo "Downloading video from GitHub Releases locally..."
        curl -L -o local_video.mp4 'https://github.com/izxxnn/stream-loop/releases/download/v1.0/VN20260630_121010.mp4'
        echo "Download complete. File status:"
        ls -lh local_video.mp4

    - name: Start Shorts Video Loop
      run: |
        # Bitrate ko badha kar standard HD full quality par lock kiya hai
        ffmpeg -re -stream_loop -1 -i local_video.mp4 \
        -vf "scale=1080:1920:force_original_aspect_ratio=decrease,pad=1080:1920:(ow-iw)/2:(oh-ih)/2" \
        -c:v libx264 -preset veryfast -b:v 4500k -maxrate 5000k -bufsize 9000k -g 60 \
        -c:a aac -b:a 128k -ar 44100 -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.STREAM_KEY }}"
        
